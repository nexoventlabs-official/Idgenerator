# Nginx Load Balancer Configuration for Phase 2
# Distributes traffic across multiple app instances

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Upstream servers (app instances)
    upstream voter_app {
        least_conn;  # Use least connections algorithm
        
        server web1:5000 max_fails=3 fail_timeout=30s;
        server web2:5000 max_fails=3 fail_timeout=30s;
        
        # Add more instances as needed:
        # server web3:5000 max_fails=3 fail_timeout=30s;
        # server web4:5000 max_fails=3 fail_timeout=30s;
        
        keepalive 32;  # Keep connections alive
    }
    
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
    
    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    
    # Main server block
    server {
        listen 80;
        server_name _;
        
        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Health check endpoint (no rate limiting)
        location /health {
            proxy_pass http://voter_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }
        
        # API endpoints (stricter rate limiting)
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            limit_conn addr 10;
            
            proxy_pass http://voter_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }
        
        # Static files (aggressive caching)
        location /static/ {
            proxy_pass http://voter_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Cache static files for 1 year
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # All other requests
        location / {
            limit_req zone=general burst=20 nodelay;
            limit_conn addr 20;
            
            proxy_pass http://voter_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }
    }
}
