<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — PuratchiThaai</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --brand: #c62828; --brand-dark: #b71c1c; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      position: relative; overflow: hidden;
    }

    /* Animated background circles */
    body::before, body::after {
      content: ''; position: absolute; border-radius: 50%; opacity: 0.07;
    }
    body::before {
      width: 500px; height: 500px; background: var(--brand);
      top: -120px; right: -100px;
      animation: float 8s ease-in-out infinite;
    }
    body::after {
      width: 350px; height: 350px; background: #f9a825;
      bottom: -80px; left: -60px;
      animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .login-card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
      width: 100%; max-width: 420px;
      padding: 2.5rem 2rem;
      position: relative; z-index: 10;
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-icon {
      width: 70px; height: 70px; border-radius: 50%;
      background: linear-gradient(135deg, var(--brand), #e53935);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.2rem;
      box-shadow: 0 8px 25px rgba(198, 40, 40, 0.35);
    }
    .login-icon i { font-size: 1.8rem; color: #fff; }

    .login-title {
      text-align: center; font-weight: 800; font-size: 1.4rem;
      color: #1a1a2e; margin-bottom: 0.3rem;
    }
    .login-subtitle {
      text-align: center; font-size: 0.85rem;
      color: #888; margin-bottom: 1.8rem;
    }

    .form-floating { margin-bottom: 1rem; }
    .form-floating .form-control {
      border: 2px solid #e0e0e0; border-radius: 12px;
      font-size: 0.95rem; padding: 1rem 0.9rem 0.5rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-floating .form-control:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(198, 40, 40, 0.12);
    }
    .form-floating label { color: #999; font-size: 0.9rem; }

    .input-icon {
      position: relative;
    }
    .input-icon .icon-left {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: #aaa; z-index: 5; font-size: 1.1rem;
    }
    .input-icon .form-control { padding-left: 2.6rem; }

    .btn-login {
      width: 100%; padding: 0.75rem;
      background: linear-gradient(135deg, var(--brand), #e53935);
      border: none; border-radius: 12px;
      color: #fff; font-weight: 700; font-size: 1rem;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative; overflow: hidden;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(198, 40, 40, 0.4);
      color: #fff;
    }
    .btn-login:active { transform: translateY(0); }

    /* Shine animation */
    .btn-login::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .btn-login:hover::after { left: 120%; }

    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #aaa; cursor: pointer;
      z-index: 5; font-size: 1.1rem;
    }
    .toggle-pw:hover { color: #555; }

    .back-link {
      display: block; text-align: center; margin-top: 1.3rem;
      font-size: 0.85rem; color: #888; text-decoration: none;
    }
    .back-link:hover { color: var(--brand); }

    .alert {
      border-radius: 12px; font-size: 0.88rem;
      border: none; padding: 0.7rem 1rem;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-icon">
      <i class="bi bi-shield-lock-fill"></i>
    </div>
    <div class="login-title">Admin Panel</div>
    <div class="login-subtitle">Sign in to manage PuratchiThaai platform</div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
    {% if msgs %}
    {% for cat, msg in msgs %}
    <div class="alert alert-{{ cat }} py-2 mb-3" role="alert">
      <i class="bi bi-{% if cat == 'danger' %}exclamation-circle{% elif cat == 'warning' %}exclamation-triangle{% else %}info-circle{% endif %}-fill me-1"></i>
      {{ msg }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" autocomplete="off">
      <div class="input-icon position-relative">
        <i class="bi bi-person-fill icon-left"></i>
        <div class="form-floating">
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="Username" required autofocus>
          <label for="username">Username</label>
        </div>
      </div>

      <div class="input-icon position-relative">
        <i class="bi bi-key-fill icon-left"></i>
        <div class="form-floating">
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Password" required>
          <label for="password">Password</label>
        </div>
        <button type="button" class="toggle-pw" onclick="togglePw()">
          <i class="bi bi-eye-fill" id="pwIcon"></i>
        </button>
      </div>

      <button type="submit" class="btn btn-login mt-2">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
    </form>

    <a href="{{ url_for('user_home') }}" class="back-link">
      <i class="bi bi-arrow-left me-1"></i> Back to Website
    </a>
  </div>

  <script>
    function togglePw() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('pwIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.classList.replace('bi-eye-fill', 'bi-eye-slash-fill');
      } else {
        pw.type = 'password';
        icon.classList.replace('bi-eye-slash-fill', 'bi-eye-fill');
      }
    }
  </script>
</body>
</html>
