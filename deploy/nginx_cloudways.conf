# ═══════════════════════════════════════════════════════════════════
# Nginx Configuration for Cloudways
# ═══════════════════════════════════════════════════════════════════
# Cloudways uses its own Nginx config system. You need to add this
# as a custom Nginx config via:
#   Cloudways Panel → Application → Nginx Config → Custom Vhost
#
# Or place it in:
#   /etc/nginx/conf.d/server/custom_server.conf
#   (inside the server block)
# ═══════════════════════════════════════════════════════════════════

# Proxy to Gunicorn (Flask app on port 8000)
location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;
}

# Static files (served directly by Nginx for performance)
location /static/ {
    alias /home/master/applications/YOUR_APP_FOLDER/public_html/static/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Health check endpoint
location /health {
    proxy_pass http://127.0.0.1:8000/health;
    proxy_set_header Host $host;
    access_log off;
}

# Block access to sensitive files
location ~ /\. {
    deny all;
}

location ~ \.(env|py|pyc|log|conf|sh)$ {
    deny all;
}

location ~ ^/(venv|__pycache__|logs|data|deploy)/ {
    deny all;
}

# File upload size limit
client_max_body_size 100M;
