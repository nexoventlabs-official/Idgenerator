; ═══════════════════════════════════════════════════════════════════
; Supervisor Config: Celery Worker
; Place at: /etc/supervisor/conf.d/idcard_celery.conf
; ═══════════════════════════════════════════════════════════════════

[program:idcard_celery]
; UPDATE the path below to match your Cloudways application directory
command=/home/master/applications/YOUR_APP_FOLDER/public_html/venv/bin/celery -A tasks worker --loglevel=info --concurrency=2
directory=/home/master/applications/YOUR_APP_FOLDER/public_html
user=master
numprocs=1
autostart=true
autorestart=true
startsecs=10
stopwaitsecs=60
stopasgroup=true
killasgroup=true
redirect_stderr=false
stderr_logfile=/home/master/applications/YOUR_APP_FOLDER/public_html/logs/celery_err.log
stdout_logfile=/home/master/applications/YOUR_APP_FOLDER/public_html/logs/celery_out.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile_backups=5
environment=PATH="/home/master/applications/YOUR_APP_FOLDER/public_html/venv/bin:%(ENV_PATH)s"
